<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiddify</title>
    <style>
        :root { --primary: #6200ee; --bg: #ffffff; --item-bg: #f5f5f7; --border: #e5e5ea; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #000; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 450px; width: 100%; }
        header { margin-bottom: 30px; text-align: center; }
        h1 { margin: 0; font-size: 28px; font-weight: 700; color: var(--primary); }
        .list { display: flex; flex-direction: column; gap: 10px; }
        .item { background: var(--item-bg); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .label { font-size: 14px; font-weight: 600; color: #333; line-height: 1.2; padding-right: 10px; }
        .btn { background: var(--primary); color: white; text-decoration: none; padding: 8px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; white-space: nowrap; transition: opacity 0.2s; }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hiddify</h1>
    </header>

    <div class="list">
        <div class="item">
            <span class="label">Rus Mobile 1</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">Rus Mobile 2</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-checked</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-SNI-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>
    </div>
</div>

</body>
</html>
